const Donut = ({data}) => {
  const sz=160,cx=80,cy=80,r=60,inn=36;
  let cum=0;
  const sl=data.map(d=>{const s=cum;cum+=d.p;return{...d,s,e:cum};});
  const pol=(cx,cy,r,deg)=>{const rad=((deg-90)*Math.PI)/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};};
  const arc=(s,e,rr)=>{const a=pol(cx,cy,rr,(s/100)*360),b=pol(cx,cy,rr,(e/100)*360);return`M ${a.x} ${a.y} A ${rr} ${rr} 0 ${e-s>50?1:0} 1 ${b.x} ${b.y}`;};
  return(
    <svg width={sz} height={sz}>
      {sl.map((s,i)=>{const ie=pol(cx,cy,inn,(s.e/100)*360),is=pol(cx,cy,inn,(s.s/100)*360);
        return<path key={i} d={`${arc(s.s,s.e,r)} L ${ie.x} ${ie.y} A ${inn} ${inn} 0 ${s.e-s.s>50?1:0} 0 ${is.x} ${is.y} Z`} fill={s.cor} stroke="white" strokeWidth={1.5}/>;
      })}
      <circle cx={cx} cy={cy} r={inn-1} fill="white"/>
    </svg>
  );
};

const ProjChart = ({dados}) => {
  if(!dados||!dados.length)return null;
  const w=480,h=200,pl=64,pr=16,pt=16,pb=36;
  const iw=w-pl-pr,ih=h-pt-pb;
  const mx=Math.max(...dados.flatMap(d=>[d.c,d.m,d.s]));
  const sy=v=>ih-(v/mx)*ih,sx=i=>(i/(dados.length-1))*iw;
  const ln=k=>dados.map((d,i)=>`${i===0?"M":"L"} ${sx(i)} ${sy(d[k])}`).join(" ");
  return(
    <svg width="100%" viewBox={`0 0 ${w} ${h}`}>
      <g transform={`translate(${pl},${pt})`}>
        {[0,0.25,0.5,0.75,1].map(t=>(
          <g key={t}>
            <line x1={0} x2={iw} y1={ih*(1-t)} y2={ih*(1-t)} stroke="#F3F4F6" strokeWidth={1}/>
            <text x={-8} y={ih*(1-t)+4} textAnchor="end" fontSize={10} fill="#9CA3AF">{fmtBRL(mx*t)}</text>
          </g>
        ))}
        {dados.map((d,i)=>i%Math.max(1,Math.floor(dados.length/5))===0?
          <text key={i} x={sx(i)} y={ih+18} textAnchor="middle" fontSize={10} fill="#9CA3AF">Ano {d.a}</text>:null)}
        <path d={ln("c")} fill="none" stroke="#3B82F6" strokeWidth={2}/>
        <path d={ln("m")} fill="none" stroke="#10B981" strokeWidth={2}/>
        <path d={ln("s")} fill="none" stroke="#F59E0B" strokeWidth={2}/>
      </g>
    </svg>
  );
};

              {Object.entries(nmMap).map(([k,v])=>(
                <button key={k} onClick={()=>setOndeInv(k)}
                  style={{background:ondeInv===k?"#FEF2F2":"#F9FAFB",border:`2px solid ${ondeInv===k?"#EF4444":"#E5E7EB"}`,borderRadius:10,padding:"12px 14px",textAlign:"left",cursor:"pointer"}}>
                  <div style={{fontSize:12,fontWeight:700,color:ondeInv===k?"#EF4444":"#374151"}}>{v}</div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{txMap[k]}% a.a.</div>
                </button>
              ))}
            </div>
          </div>
          <Slider label="Valor total investido hoje" value={valAt} onChange={setValAt} min={10000} max={2000000} step={10000} pre="R$ " fmt={v=>v.toLocaleString("pt-BR")}/>
          <div style={{background:"#FEF2F2",borderRadius:12,padding:20,border:"1px solid #FCA5A5"}}>
            <div style={{fontSize:13,color:"#991B1B",fontWeight:700,marginBottom:14}}>
              {nmMap[ondeInv]} ({txAt}% a.a.) vs. Carteira {c?.nome||"Ideal"} ({txId.toFixed(1)}% a.a.)
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[{l:"Perdendo por mês",v:fmtBRL(perdaMes),cor:"#EF4444"},{l:"Perdendo por ano",v:fmtBRL(perdaAno),cor:"#DC2626"},{l:"Diferença em 10 anos",v:fmtBRL(perda10),cor:"#B91C1C"}].map(m=>(
                <div key={m.l} style={{background:"white",borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#9CA3AF",marginBottom:4}}>{m.l}</div>
                  <div style={{fontSize:14,fontWeight:800,color:m.cor}}>{m.v}</div>
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:"#7F1D1D",marginTop:12,marginBottom:0,lineHeight:1.5}}>
              💡 Ao migrar para a Carteira {c?.nome||"recomendada"}, você acumularia <strong>{fmtBRL(perda10)}</strong> a mais nos próximos 10 anos.
            </p>
          </div>
        </div>

        {/* Aposentadoria */}
        <div style={{background:"white",borderRadius:16,padding:28,marginTop:16,boxShadow:"0 4px 24px rgba(0,0,0,0.07)",border:`2px solid ${sufic?"#D1FAE5":"#FDE68A"}`}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"#111827",margin:"0 0 6px"}}>🏖️ Simulador de Aposentadoria</h2>
          <p style={{fontSize:13,color:"#6B7280",marginBottom:20}}>Descubra se seu plano atual é suficiente para se aposentar com a renda que deseja.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <Slider label="Sua idade atual" value={idadeAt} onChange={setIdadeAt} min={18} max={65} step={1} suf=" anos"/>
              <Slider label="Idade para aposentar" value={idadeAp} onChange={v=>setIdadeAp(Math.max(idadeAt+5,v)) } min={30} max={75} step={1} suf=" anos"/>
            </div>
            <div>
              <Slider label="Renda mensal desejada" value={rendaDes} onChange={setRendaDes} min={3000} max={100000} step={1000} pre="R$ " fmt={v=>v.toLocaleString("pt-BR")}/>
              <Slider label="Patrimônio atual" value={patriAt} onChange={setPatriAt} min={0} max={2000000} step={10000} pre="R$ " fmt={v=>v.toLocaleString("pt-BR")}/>
            </div>
          </div>
          <div style={{background:sufic?"#ECFDF5":"#FFFBEB",borderRadius:12,padding:20,border:`1px solid ${sufic?"#6EE7B7":"#FDE68A"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{fontSize:32}}>{sufic?"✅":"⚠️"}</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:sufic?"#065F46":"#92400E"}}>{sufic?"Plano no caminho certo!":"Ajuste necessário no plano"}</div>
                <div style={{fontSize:12,color:sufic?"#047857":"#B45309"}}>
                  {sufic?`Você está no rumo para aposentar aos ${idadeAp} anos`:`Faltam ${fmtBRL(gap)} para atingir a independência`}
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:sufic?0:16}}>
              {[{l:"Patrimônio necessário (Regra 4%)",v:fmtBRL(patriNec),cor:"#EF4444"},{l:`Projetado em ${anosAp} anos`,v:fmtBRL(patriProj),cor:sufic?"#10B981":"#F59E0B"}].map(m=>(
                <div key={m.l} style={{background:"white",borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#9CA3AF",marginBottom:4}}>{m.l}</div>
                  <div style={{fontSize:14,fontWeight:800,color:m.cor}}>{m.v}</div>
                </div>
              ))}
            </div>
            {!sufic&&<div style={{background:"white",borderRadius:8,padding:"12px 16px",border:"1px solid #FDE68A",fontSize:12,color:"#92400E"}}>
              💡 Para atingir sua meta, aumente o aporte para <strong>{fmtBRL(aporte+aporteNec)}</strong> (+{fmtBRL(aporteNec)}/mês) ou estenda o prazo.
            </div>}
            <p style={{fontSize:11,color:"#9CA3AF",marginTop:12,marginBottom:0}}>* Regra dos 4% (Safe Withdrawal Rate) — referência internacional para planejamento de aposentadoria.</p>
          </div>
        </div>

        {/* Carteiras */}
        <div style={{marginTop:24}}>
          <h2 style={{fontSize:18,fontWeight:800,color:"#111827",textAlign:"center",marginBottom:4}}>🏦 Estratégias de Carteira</h2>
          <p style={{fontSize:13,color:"#6B7280",textAlign:"center",marginBottom:20}}>
            {perfil?`Com base no seu perfil, a carteira ${CART[perfil].nome} é a mais indicada.`:"Escolha o perfil ideal"}
          </p>
          {Object.entries(CART).map(([key,ct])=>(
            <div key={key} onClick={()=>setCartOpen(cartOpen===key?null:key)}
              style={{background:cartOpen===key?ct.corL:"white",borderRadius:14,border:`2px solid ${cartOpen===key?ct.cor:key===perfil?ct.cor+"55":"#E5E7EB"}`,marginBottom:12,cursor:"pointer",overflow:"hidden",transition:"all 0.2s"}}>
              <div style={{padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:28}}>{ct.ic}</div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:800,fontSize:17,color:"#111827"}}>Carteira {ct.nome}</span>
                      {key===perfil&&<span style={{fontSize:10,background:ct.cor,color:"white",borderRadius:99,padding:"2px 8px",fontWeight:700}}>Recomendada</span>}
                    </div>
                    <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>Volatilidade {ct.vol}</div>
                    <RiscoBar n={ct.risco} cor={ct.cor}/>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:800,color:ct.cor}}>+{ct.ret}%</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>retorno hist. a.a.</div>
                  <div style={{fontSize:12,marginTop:4,color:cartOpen===key?ct.cor:"#9CA3AF"}}>{cartOpen===key?"▲ Fechar":"▼ Ver detalhes"}</div>
                </div>
              </div>
              {cartOpen===key&&(
                <div style={{borderTop:`1px solid ${ct.cor}33`,padding:"20px 24px"}}>
                  <p style={{fontSize:13,color:"#374151",marginTop:0,marginBottom:20,lineHeight:1.6}}>{ct.desc}</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                    {[
                      {l:<Tip termo="Volatilidade">Volatilidade a.a.</Tip>,v:`±${ct.volAA}%`},
                      {l:<Tip termo="Sharpe Ratio">Índice Sharpe</Tip>,v:ct.sharpe.toFixed(1)},
                      {l:<Tip termo="Drawdown">Max. Drawdown</Tip>,v:`${ct.dd}%`},
                    ].map((m,i)=>(
                      <div key={i} style={{background:"white",borderRadius:8,padding:"10px 12px",border:"1px solid #E5E7EB"}}>
                        <div style={{fontSize:11,color:"#9CA3AF",marginBottom:3}}>{m.l}</div>
                        <div style={{fontSize:16,fontWeight:700,color:ct.cor}}>{m.v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>
                    <Donut data={ct.dist}/>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{fontWeight:700,fontSize:13,color:"#111827",marginBottom:8}}>Alocação</div>
                      {ct.dist.map(d=>(
                        <div key={d.cl} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:12,color:"#374151",display:"flex",alignItems:"center",gap:6}}>
                              <span style={{width:8,height:8,borderRadius:"50%",background:d.cor,display:"inline-block",flexShrink:0}}/>
                              {d.cl}
                            </span>
                            <span style={{fontSize:12,fontWeight:700,color:"#111827"}}>{d.p}%</span>
                          </div>
                          <div style={{background:"#F3F4F6",borderRadius:4,height:5}}>
                            <div style={{background:d.cor,height:"100%",borderRadius:4,width:`${d.p}%`}}/>
                          </div>
                          <div style={{fontSize:10,color:"#9CA3AF",marginTop:2}}>{d.d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{marginTop:16,background:"#FEF2F2",borderRadius:8,padding:"12px 16px",border:"1px solid #FCA5A5"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:6}}>⚠️ Riscos & Advertências</div>
                    {ct.alerts.map((a,i)=>(
                      <div key={i} style={{fontSize:12,color:"#7F1D1D",marginBottom:3,display:"flex",gap:6}}>
                        <span>•</span><span>{a}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Glossário */}
        <div style={{background:"white",borderRadius:16,padding:24,marginTop:16,border:"1px solid #E5E7EB"}}>
          <h3 style={{fontSize:15,fontWeight:700,color:"#111827",margin:"0 0 4px"}}>📚 Glossário</h3>
          <p style={{fontSize:12,color:"#9CA3AF",margin:"0 0 16px"}}>Passe o mouse sobre termos sublinhados na plataforma para ver definições. Ou consulte abaixo:</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {Object.entries(GLOSS).map(([t,d])=>(
              <div key={t} style={{background:"#F9FAFB",borderRadius:8,padding:12,border:"1px solid #E5E7EB"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#6366F1",marginBottom:4}}>{t}</div>
                <div style={{fontSize:11,color:"#6B7280",lineHeight:1.5}}>{d}</div>
              </div>
            ))}
          </div>
        </div>

        {/* CTA PDF */}
        <div style={{background:"linear-gradient(135deg,#1e1b4b,#4338ca)",borderRadius:16,padding:28,marginTop:16,textAlign:"center",color:"white"}}>
          <div style={{fontSize:32,marginBottom:8}}>📄</div>
          <h3 style={{fontSize:18,fontWeight:800,margin:"0 0 8px"}}>Baixe seu Relatório Completo</h3>
          <p style={{fontSize:13,opacity:0.8,margin:"0 0 20px",lineHeight:1.6}}>
            Relatório personalizado com perfil, carteira, simulação de aposentadoria e projeção de patrimônio.
          </p>
          <button onClick={gerarRelatorio}
            style={{background:"white",color:"#1e1b4b",border:"none",borderRadius:12,padding:"14px 32px",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            📥 Baixar Relatório — {nome}
          </button>
        </div>

        <div style={{background:"#F1F5F9",borderRadius:10,padding:"14px 18px",marginTop:16,border:"1px solid #CBD5E1"}}>
          <div style={{fontSize:11,color:"#64748B",lineHeight:1.6}}>
            <strong>📋 Aviso Legal:</strong> As informações e projeções têm caráter educacional e não constituem recomendação de investimento. Rentabilidades passadas não garantem resultados futuros. Consulte sempre um profissional certificado (CFP® / CNPI). Dados históricos: mercado brasileiro 2004–2024.
          </div>
        </div>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
